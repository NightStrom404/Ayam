<style>
body {

    justify-content: center;
    align-items: flex-start;
    height: 100vh;
    padding-top: 110px;
    font-family: Arial, sans-serif;

.wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    text-align: center;
}

.logo {
    width: 220px;
    max-width: 75%;
    border-radius: 12px;
}

.text {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;

    background: linear-gradient(
        90deg,
        red, orange, yellow, green, cyan, blue, violet, red
    );
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: rainbowMove 3s linear infinite;
}

@keyframes rainbowMove {
    0% { background-position: 0%; }
    100% { background-position: 300%; }
}

.hidden-captcha {
    display: none;
}

<body>

<div style="display:none;">

        data-sitekey="0x4AAAAAACmUJApqFJoi7W6SxRXfjZ6wnvA"
        data-callback="onTurnstileSuccess">
    </div>
</div>

<script>
let verifiedCount = 0;

window.onload = function() {
    hcaptcha.render('hcaptcha-container', {
        sitekey: "5f8096c6-cb04-4b1e-9958-cbe03e1a0c24",
        size: "invisible",
        callback: function(token) {
            fetch("captcha.php", {
                method: "POST",
                headers: {"Content-Type": "application/x-www-form-urlencoded"},
                body: "h-captcha-response=" + token
            }).then(() => verifiedCount++);
        }
    });

    grecaptcha.ready(function() {
        grecaptcha.execute('6LdKsnosAAAAANZh_8Qohj-QEkSsac49VdnRmtbo', {action: 'homepage'})
        .then(function(token) {
            fetch("api.php", {
                method: "POST",
                headers: {"Content-Type": "application/x-www-form-urlencoded"},
                body: "token=" + token
            }).then(() => verifiedCount++);
        });
    });
}
</script>
